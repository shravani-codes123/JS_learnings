<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            transition: background-color 0.4s ease;

        }
        .container{
            text-align: center;
            margin-top: 100px;
        }
        .buttons{
            margin: 30px 0;
        }
        .button{
            width: 100px;
            height: 100px;
            border : 2px solid black;
            display: inline-block;
            cursor: pointer;
            margin: 10px;
        }
        #grey{
            background-color: grey;
        }
        #white{
            background-color: white;
        }
        #blue{
            background-color: blue;
        }
        #yellow{
            background-color: yellow;
        }
        h1{
            margin-bottom: 30px;
        }
        h2 span{
            display: block;
            margin-top: 10px;
            font-size : 18px
        }
    </style>
</head>
<body>
     <div class="container"></div>
      <h1>Color Scheme Changer</h1>

      <div class="buttons">
        <button class="button" id = "grey"></button>
        <button class="button" id = "white"></button>
        <button class="button" id = "blue"></button>
        <button class="button" id = "yellow"></button>
      </div>

      <h2>
        Try clicking one of the colors above <span>to change the 
            background color of this page
        </span>
      </h2>
      <script>
          const button = document.querySelectorAll('.button')
          const body = document.querySelector('body')

         button.forEach(function (button){
            button.addEventListener('click' , function(e){
                if(e.target.id === 'grey'){
                     body.style.backgroundColor= e.target.id;
                }
                else if(e.target.id === 'white'){
                    body.style.backgroundColor = e.target.id;
                }else if(e.target.id === 'yellow'){
                    body.style.backgroundColor = e.target.id;
                }else if(e.target.id === 'blue'){
                    body.style.backgroundColor = e.target.id;
                }
            })
         })
      </script>
</body>
</html>
